name: A.I.M. Test Suite

on:
  push:
    branches: [ main, dev-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install system dependencies for keyring
      run: sudo apt-get update && sudo apt-get install -y dbus-x11 pkg-config libdbus-1-dev
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f aim-agy_os/requirements.txt ]; then pip install -r aim-agy_os/requirements.txt; fi
        pip install pytest
        
    - name: Run unit tests
      env:
        PYTHONPATH: ${{ github.workspace }}/aim-agy_os:${{ github.workspace }}/aim-agy_os/.aim_core
      run: |
        pytest aim-agy_os/tests/ -v
        
    - name: Installer Syntax and Dry-Run Checks
      run: |
        echo "Checking syntax of installer scripts..."
        bash -n aim-agy_os/setup.sh
        bash -n aim-agy_os/install-core.sh
        bash -n aim-agy_os/install-agent.sh
        bash -n aim-agy_os/install-clean.sh
        
        echo "Validating path sanity inside installer scripts..."
        grep -q 'aim-agy_os/setup.sh' aim-agy_os/install-core.sh || { echo "missing aim-agy_os/setup.sh"; exit 1; }
        grep -q 'memory_lance' aim-agy_os/install-core.sh || { echo "missing memory_lance seed path"; exit 1; }